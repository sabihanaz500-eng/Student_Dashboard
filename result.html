<!DOCTYPE html>
<html>
<head>
<title>Student Result</title>

<style>
body {
    font-family: Arial;
    background:#eef2ff;
}

.result-card {
    width:85%;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px gray;
}

.header {
    background:#2563eb;
    color:white;
    text-align:center;
    padding:15px;
    border-radius:10px;
}

select {
    padding:10px;
    font-size:16px;
    margin:20px 0;
}

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    border:1px solid gray;
    padding:10px;
    text-align:center;
}

th {
    background:#2563eb;
    color:white;
}

.summary {
    background:#dcfce7;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="result-card">

<div class="header">
<h1>Student Result</h1>
<p>Diploma in Computer Science Engineering</p>
</div>


<h3>Select Semester</h3>

<select onchange="showResult(this.value)">

<option value="">Select Semester</option>
<option value="1">1st Semester</option>
<option value="2">2nd Semester</option>
<option value="3">3rd Semester</option>

</select>


<div id="result"></div>


</div>

let data="";

data=`

<tr><td>Chemistry</td><td>84</td></tr>
<tr><td>Engineering Graphics</td><td>86</td></tr>
<tr><td>Communication Skills</td><td>83</td></tr>

</table>

<div class="summary">

<b>Total Marks:</b> 927 / 1050 <br>

<b>Percentage:</b> 88.28% <br>

<b>Result:</b> Pass <br>

<b>SGPA:</b> 8.8 <br>

<b>CGPA:</b> 8.8

</div>

`;
}


else if(sem=="2"){
data=`

</body>
</html>
