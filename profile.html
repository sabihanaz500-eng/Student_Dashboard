<!DOCTYPE html>
<html>
<head>
<title>Student Profile</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #eef2ff;
    margin: 0;
    padding: 0;
}

.profile-card {
    width: 85%;
    max-width: 500px;
    margin: 40px auto;
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 10px gray;
    text-align: center;
}

.header {
    background-color: #2563eb;
    color: white;
    padding: 15px;
    border-radius: 12px;
}

.header h1 {
    margin: 5px;
}

.info {
    margin-top: 20px;
    text-align: left;
}

.info-box {
    background-color: #f1f5f9;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    font-size: 17px;
}

.status {
    margin-top: 20px;
    background-color: #dcfce7;
    padding: 10px;
    border-radius: 8px;
    color: green;
    font-weight: bold;
}

button {
    margin-top: 20px;
    background-color: #2563eb;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 16px;
}

</style>

</head>

<body>

<div class="profile-card">

    <div class="header">
        <h1>Student Profile</h1>
        <p>Diploma CSE</p>
    </div>

    <div class="info">

        <div class="info-box">
            <b>Name:</b> Sabiha Naz
        </div>

        <div class="info-box">
            <b>Roll No:</b> 25DPCS022DB
        </div>

        <div class="info-box">
            <b>Course:</b> Diploma in Computer Science Engineering
        </div>

        <div class="info-box">
            <b>Semester:</b> 3rd
        </div>

        <div class="info-box">
            <b>Department:</b> Computer Science Engineering
        </div>

    </div>

    <div class="status">
        Student Status: Active
    </div>

    <button>Back to Dashboard</button>

</div>

</body>
</html>
